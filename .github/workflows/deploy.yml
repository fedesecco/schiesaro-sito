name: Release Deploy to GitHub Pages

on:
  push:
    tags:
      - '*.*.*'
  workflow_run:
    workflows:
      - Create Release Tag From Package Version
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      deploy_allowed: ${{ steps.verify_main.outputs.deploy_allowed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - name: Verify tag commit belongs to main
        id: verify_main
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_run" ]]; then
            echo "Triggered from successful release-tag workflow on main."
            echo "deploy_allowed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "deploy_allowed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch origin main --depth=1

          if git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main"; then
            echo "Tag commit is contained in origin/main."
            echo "deploy_allowed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Tag commit is not contained in origin/main. Skipping deploy."
            echo "deploy_allowed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Pages
        if: steps.verify_main.outputs.deploy_allowed == 'true'
        uses: actions/configure-pages@v5

      - name: Set up Node.js
        if: steps.verify_main.outputs.deploy_allowed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.verify_main.outputs.deploy_allowed == 'true'
        run: npm ci

      - name: Build Angular app
        if: steps.verify_main.outputs.deploy_allowed == 'true'
        run: npm run build -- --configuration production --base-href /schiesaro-sito/

      - name: Upload Pages artifact
        if: steps.verify_main.outputs.deploy_allowed == 'true'
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist/schiesaro-sito/browser

  deploy:
    if: needs.build.outputs.deploy_allowed == 'true'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
